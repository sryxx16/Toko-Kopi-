<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Admin - Pengelolaan Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
  </head>
  <body
    onload="initAdminPage()"
    class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200 transition-colors duration-300"
  >
    <nav
      class="sticky top-0 z-40 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 transition-colors"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center gap-2">
            <div
              class="w-10 h-10 bg-emerald-100 dark:bg-emerald-900 rounded-xl flex items-center justify-center"
            >
              <i
                class="ph-fill ph-coffee text-2xl text-emerald-600 dark:text-emerald-400"
              ></i>
            </div>
            <span class="text-xl font-bold tracking-tight">KopiKita</span>
          </div>

          <div class="hidden md:flex items-center space-x-2">
            <a
              href="admin.html"
              class="flex items-center gap-2 px-4 py-2 rounded-lg bg-emerald-50 dark:bg-emerald-900/50 text-emerald-700 dark:text-emerald-400 font-semibold transition-all"
              ><i class="ph-fill ph-package text-lg"></i> Menu</a
            >
            <a
              href="laporan.html"
              class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 font-medium transition-all active:scale-95"
              ><i class="ph ph-chart-line-up text-lg"></i> Laporan</a
            >
            <a
              href="users.html"
              class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 font-medium transition-all active:scale-95"
              ><i class="ph ph-users text-lg"></i> Pegawai</a
            >
            <a
              href="order.html"
              class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 font-medium transition-all active:scale-95"
              ><i class="ph ph-shopping-cart text-lg"></i> Kasir</a
            >
          </div>

          <div class="flex items-center gap-3">
            <button
              onclick="toggleDarkMode()"
              class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all active:scale-95"
              title="Ganti Tema"
            >
              <i
                class="ph-fill ph-moon text-xl text-slate-600"
                id="themeIcon"
              ></i>
            </button>
            <button
              onclick="logout()"
              class="flex items-center gap-2 px-4 py-2 rounded-lg bg-rose-500 text-white font-medium hover:bg-rose-600 shadow-sm hover:shadow transition-all active:scale-95"
            >
              <i class="ph ph-sign-out text-lg"></i>
              <span class="hidden sm:block">Logout</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-8">
        <div
          class="group bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex items-center justify-between transition-all duration-300 hover:shadow-lg hover:-translate-y-1 cursor-default"
        >
          <div>
            <p
              class="text-sm text-slate-500 dark:text-slate-400 font-semibold mb-1 uppercase tracking-wider"
            >
              Pendapatan Hari Ini
            </p>
            <h3
              id="pendapatanHariIni"
              class="text-3xl font-bold text-emerald-600 dark:text-emerald-400"
            >
              Rp 0
            </h3>
          </div>
          <div
            class="w-14 h-14 flex items-center justify-center bg-emerald-50 dark:bg-emerald-900/30 rounded-full group-hover:scale-110 transition-transform duration-300"
          >
            <i class="ph-fill ph-wallet text-3xl text-emerald-500"></i>
          </div>
        </div>

        <div
          class="group bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex items-center justify-between transition-all duration-300 hover:shadow-lg hover:-translate-y-1 cursor-default"
        >
          <div>
            <p
              class="text-sm text-slate-500 dark:text-slate-400 font-semibold mb-1 uppercase tracking-wider"
            >
              Transaksi Hari Ini
            </p>
            <h3
              id="transaksiHariIni"
              class="text-3xl font-bold text-indigo-600 dark:text-indigo-400"
            >
              0
            </h3>
          </div>
          <div
            class="w-14 h-14 flex items-center justify-center bg-indigo-50 dark:bg-indigo-900/30 rounded-full group-hover:scale-110 transition-transform duration-300"
          >
            <i class="ph-fill ph-receipt text-3xl text-indigo-500"></i>
          </div>
        </div>
      </div>

      <div class="grid xl:grid-cols-3 gap-6">
        <div class="xl:col-span-2 space-y-6">
          <section
            class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 transition-colors overflow-hidden"
          >
            <div
              class="p-5 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center"
            >
              <h2 class="font-bold text-lg flex items-center gap-2">
                <i class="ph-fill ph-list-dashes text-indigo-500"></i> Daftar
                Menu Kopi
              </h2>
              <button
                onclick="tampilkanMenuAdmin()"
                class="flex items-center gap-2 px-3 py-1.5 text-sm rounded-lg bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 font-medium transition-all active:scale-95"
              >
                <i class="ph ph-arrows-clockwise"></i> Refresh
              </button>
            </div>
            <div class="overflow-x-auto">
              <table class="min-w-full text-sm">
                <thead
                  class="bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400"
                >
                  <tr>
                    <th class="px-5 py-3 text-left font-semibold">No</th>
                    <th class="px-5 py-3 text-left font-semibold">Nama Menu</th>
                    <th class="px-5 py-3 text-left font-semibold">Harga</th>
                    <th class="px-5 py-3 text-center font-semibold">Stok</th>
                    <th class="px-5 py-3 text-center font-semibold">Aksi</th>
                  </tr>
                </thead>
                <tbody
                  id="hasil"
                  class="text-slate-700 dark:text-slate-300 divide-y divide-slate-100 dark:divide-slate-700/50"
                ></tbody>
              </table>
            </div>
          </section>
        </div>

        <div class="space-y-6">
          <section
            class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700 transition-colors"
          >
            <h2 class="font-bold text-lg mb-5 flex items-center gap-2">
              <i class="ph-fill ph-plus-circle text-emerald-500"></i> Tambah
              Menu Baru
            </h2>
            <div class="space-y-4 mb-6">
              <div>
                <label
                  class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1"
                  >Nama Menu</label
                >
                <div class="relative">
                  <i
                    class="ph ph-coffee absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
                  ></i>
                  <input
                    type="text"
                    id="menuBaru"
                    placeholder="Contoh: Kopi Susu"
                    class="w-full rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 pl-10 pr-3 py-2.5 outline-none focus:ring-2 focus:ring-emerald-500 dark:focus:ring-emerald-400 transition-all"
                  />
                </div>
              </div>
              <div>
                <label
                  class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1"
                  >Harga (Rp)</label
                >
                <div class="relative">
                  <i
                    class="ph ph-tag absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
                  ></i>
                  <input
                    type="number"
                    id="hargaMenu"
                    placeholder="15000"
                    class="w-full rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 pl-10 pr-3 py-2.5 outline-none focus:ring-2 focus:ring-emerald-500 transition-all"
                  />
                </div>
              </div>
              <div>
                <label
                  class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1"
                  >Stok Awal</label
                >
                <div class="relative">
                  <i
                    class="ph ph-stack absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
                  ></i>
                  <input
                    type="number"
                    id="stokMenu"
                    placeholder="50"
                    min="1"
                    class="w-full rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 pl-10 pr-3 py-2.5 outline-none focus:ring-2 focus:ring-emerald-500 transition-all"
                  />
                </div>
              </div>
              <div>
                <label
                  class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1"
                  >Kategori</label
                >
                <div class="relative">
                  <i
                    class="ph ph-tag absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
                  ></i>
                  <select
                    id="kategoriMenu"
                    class="w-full rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 pl-10 pr-3 py-2.5 outline-none focus:ring-2 focus:ring-emerald-500 transition-all"
                  >
                    <option value="">-- Pilih Kategori --</option>
                    <option value="kopi">☕ Kopi</option>
                    <option value="non-kopi">🥤 Non-Kopi</option>
                    <option value="snack">🍪 Snack</option>
                  </select>
                </div>
              </div>
            </div>
            <button
              onclick="tambahMenu()"
              class="w-full flex justify-center items-center gap-2 rounded-xl bg-emerald-500 text-white px-4 py-3 hover:bg-emerald-600 font-bold shadow-md hover:shadow-lg transition-all active:scale-95"
            >
              <i class="ph-bold ph-floppy-disk text-lg"></i> Simpan Menu
            </button>
          </section>
        </div>
      </div>
    </div>

    <div
      id="editModal"
      class="fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 bg-slate-900/40 backdrop-blur-sm"
    >
      <div
        id="editModalContent"
        class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md p-6 transform scale-95 translate-y-4 opacity-0 transition-all duration-300"
      >
        <h2
          class="text-xl font-bold text-slate-800 dark:text-white mb-5 flex items-center gap-2"
        >
          <i class="ph-fill ph-pencil-simple text-blue-500"></i> Edit Menu
        </h2>

        <div class="space-y-4">
          <div>
            <label
              class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1"
              >Nama Menu</label
            >
            <input
              type="text"
              id="editNama"
              class="w-full rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 px-3 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-all"
            />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label
                class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1"
                >Harga (Rp)</label
              >
              <input
                type="number"
                id="editHarga"
                min="1000"
                class="w-full rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 px-3 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-all"
              />
            </div>
            <div>
              <label
                class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1"
                >Stok</label
              >
              <input
                type="number"
                id="editStok"
                min="0"
                class="w-full rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 px-3 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-all"
              />
            </div>
          </div>
          <div>
            <label
              class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1"
              >Kategori</label
            >
            <select
              id="editKategori"
              class="w-full rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 px-3 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-all"
            >
              <option value="">-- Pilih Kategori --</option>
              <option value="kopi">☕ Kopi</option>
              <option value="non-kopi">🥤 Non-Kopi</option>
              <option value="snack">🍪 Snack</option>
            </select>
          </div>
        </div>

        <div class="mt-8 flex justify-end gap-3">
          <button
            onclick="tutupModalEdit()"
            class="px-5 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 font-semibold transition-all active:scale-95"
          >
            Batal
          </button>
          <button
            onclick="simpanEditMenu()"
            class="px-5 py-2.5 flex items-center gap-2 rounded-xl bg-blue-500 text-white hover:bg-blue-600 font-semibold shadow-md transition-all active:scale-95"
          >
            <i class="ph-bold ph-check"></i> Simpan
          </button>
        </div>
      </div>
    </div>

    <script src="../assets/js/global.js"></script>
    <script src="../assets/js/admin.js"></script>
  </body>
</html>
