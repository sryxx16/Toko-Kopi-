<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manajemen Pegawai - KopiKita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
  </head>
  <body
    onload="initUsersPage()"
    class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200 transition-colors duration-300"
  >
    <nav
      class="sticky top-0 z-40 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 transition-colors"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center gap-2">
            <div
              class="w-10 h-10 bg-emerald-100 dark:bg-emerald-900 rounded-xl flex items-center justify-center"
            >
              <i
                class="ph-fill ph-coffee text-2xl text-emerald-600 dark:text-emerald-400"
              ></i>
            </div>
            <span class="text-xl font-bold tracking-tight">KopiKita</span>
          </div>

          <div class="hidden md:flex items-center space-x-2">
            <a
              href="admin.html"
              class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 font-medium transition-all active:scale-95"
              ><i class="ph ph-package text-lg"></i> Menu</a
            >
            <a
              href="laporan.html"
              class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 font-medium transition-all active:scale-95"
              ><i class="ph ph-chart-line-up text-lg"></i> Laporan</a
            >
            <a
              href="users.html"
              class="flex items-center gap-2 px-4 py-2 rounded-lg bg-emerald-50 dark:bg-emerald-900/50 text-emerald-700 dark:text-emerald-400 font-semibold transition-all"
              ><i class="ph-fill ph-users text-lg"></i> Pegawai</a
            >
            <a
              href="order.html"
              class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 font-medium transition-all active:scale-95"
              ><i class="ph ph-shopping-cart text-lg"></i> Kasir</a
            >
          </div>

          <div class="flex items-center gap-3">
            <button
              onclick="toggleDarkMode()"
              class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all active:scale-95"
              title="Ganti Tema"
            >
              <i
                class="ph-fill ph-moon text-xl text-slate-600"
                id="themeIcon"
              ></i>
            </button>
            <button
              onclick="logout()"
              class="flex items-center gap-2 px-4 py-2 rounded-lg bg-rose-500 text-white font-medium hover:bg-rose-600 shadow-sm hover:shadow transition-all active:scale-95"
            >
              <i class="ph ph-sign-out text-lg"></i>
              <span class="hidden sm:block">Logout</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div
        class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 mb-8 transition-colors flex justify-between items-center flex-wrap gap-4"
      >
        <h1 class="text-2xl font-bold flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-full bg-indigo-100 dark:bg-indigo-900/50 flex items-center justify-center text-indigo-600 dark:text-indigo-400"
          >
            <i class="ph-fill ph-identification-badge text-xl"></i>
          </div>
          Manajemen Akun Pegawai
        </h1>
        <span
          class="inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 font-semibold text-sm border border-indigo-100 dark:border-indigo-800"
        >
          <i class="ph-fill ph-shield-check"></i> Kelola Akses
        </span>
      </div>

      <div class="grid lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 space-y-6">
          <section
            class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700 transition-colors sticky top-24"
          >
            <h3
              class="font-bold text-lg mb-5 flex items-center gap-2 text-slate-800 dark:text-white"
            >
              <i class="ph-fill ph-user-plus text-emerald-500"></i> Tambah Akun
              Baru
            </h3>

            <div class="space-y-4 mb-6">
              <div>
                <label
                  class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1"
                  >Username</label
                >
                <div class="relative">
                  <i
                    class="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
                  ></i>
                  <input
                    type="text"
                    id="usernameBaru"
                    placeholder="misal: kasirpagi"
                    class="w-full rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 pl-10 pr-3 py-2.5 outline-none focus:ring-2 focus:ring-emerald-500 dark:focus:ring-emerald-400 transition-all"
                  />
                </div>
              </div>

              <div>
                <label
                  class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1"
                  >Password</label
                >
                <div class="relative">
                  <i
                    class="ph ph-lock-key absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
                  ></i>
                  <input
                    type="text"
                    id="passwordBaru"
                    placeholder="Masukkan password"
                    class="w-full rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 pl-10 pr-3 py-2.5 outline-none focus:ring-2 focus:ring-emerald-500 dark:focus:ring-emerald-400 transition-all"
                  />
                </div>
              </div>

              <div>
                <label
                  class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1"
                  >Hak Akses (Role)</label
                >
                <div class="relative">
                  <i
                    class="ph ph-briefcase absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
                  ></i>
                  <select
                    id="roleBaru"
                    class="w-full rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 pl-10 pr-3 py-2.5 outline-none focus:ring-2 focus:ring-emerald-500 dark:focus:ring-emerald-400 transition-all appearance-none"
                  >
                    <option value="kasir">Kasir</option>
                    <option value="admin">Admin</option>
                  </select>
                  <i
                    class="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"
                  ></i>
                </div>
              </div>
            </div>

            <button
              onclick="tambahUser()"
              class="w-full flex justify-center items-center gap-2 rounded-xl bg-emerald-500 text-white px-4 py-3 hover:bg-emerald-600 font-bold shadow-md hover:shadow-lg transition-all active:scale-95"
            >
              <i class="ph-bold ph-plus-circle text-lg"></i> Buat Akun
            </button>
          </section>
        </div>

        <div class="lg:col-span-2">
          <section
            class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 transition-colors"
          >
            <h3
              class="font-bold text-lg mb-5 flex items-center gap-2 text-slate-800 dark:text-white"
            >
              <i class="ph-fill ph-users-three text-indigo-500"></i> Daftar Akun
              Terdaftar
            </h3>

            <div
              class="overflow-x-auto rounded-xl border border-slate-200 dark:border-slate-700"
            >
              <table class="min-w-full text-sm">
                <thead
                  class="bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700"
                >
                  <tr>
                    <th class="px-5 py-4 text-left font-semibold">No</th>
                    <th class="px-5 py-4 text-left font-semibold">
                      Informasi Akun
                    </th>
                    <th class="px-5 py-4 text-left font-semibold">Role</th>
                    <th class="px-5 py-4 text-center font-semibold">Aksi</th>
                  </tr>
                </thead>
                <tbody
                  id="hasilUser"
                  class="text-slate-700 dark:text-slate-300 divide-y divide-slate-100 dark:divide-slate-700/50"
                ></tbody>
              </table>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script src="../assets/js/global.js"></script>
    <script src="../assets/js/users.js"></script>
  </body>
</html>
