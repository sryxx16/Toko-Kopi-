<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Laporan - Analitik KopiKita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body
    onload="initLaporanPage()"
    class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200 transition-colors duration-300"
  >
    <nav
      class="sticky top-0 z-40 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 transition-colors"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center gap-2">
            <div
              class="w-10 h-10 bg-emerald-100 dark:bg-emerald-900 rounded-xl flex items-center justify-center"
            >
              <i
                class="ph-fill ph-coffee text-2xl text-emerald-600 dark:text-emerald-400"
              ></i>
            </div>
            <span class="text-xl font-bold tracking-tight">KopiKita</span>
          </div>

          <div class="hidden md:flex items-center space-x-2">
            <a
              href="admin.html"
              class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 font-medium transition-all active:scale-95"
              ><i class="ph ph-package text-lg"></i> Menu</a
            >
            <a
              href="laporan.html"
              class="flex items-center gap-2 px-4 py-2 rounded-lg bg-emerald-50 dark:bg-emerald-900/50 text-emerald-700 dark:text-emerald-400 font-semibold transition-all"
              ><i class="ph-fill ph-chart-line-up text-lg"></i> Laporan</a
            >
            <a
              href="users.html"
              class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 font-medium transition-all active:scale-95"
              ><i class="ph ph-users text-lg"></i> Pegawai</a
            >
            <a
              href="order.html"
              class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 font-medium transition-all active:scale-95"
              ><i class="ph ph-shopping-cart text-lg"></i> Kasir</a
            >
          </div>

          <div class="flex items-center gap-3">
            <button
              onclick="toggleDarkMode()"
              class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all active:scale-95"
              title="Ganti Tema"
            >
              <i
                class="ph-fill ph-moon text-xl text-slate-600"
                id="themeIcon"
              ></i>
            </button>
            <button
              onclick="logout()"
              class="flex items-center gap-2 px-4 py-2 rounded-lg bg-rose-500 text-white font-medium hover:bg-rose-600 shadow-sm hover:shadow transition-all active:scale-95"
            >
              <i class="ph ph-sign-out text-lg"></i>
              <span class="hidden sm:block">Logout</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div
        class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 mb-6 transition-colors"
      >
        <div
          class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 border-b border-slate-100 dark:border-slate-700 pb-4"
        >
          <h2
            class="text-2xl font-bold text-slate-800 dark:text-white flex items-center gap-2"
          >
            <i class="ph-fill ph-chart-pie-slice text-indigo-500"></i> Analitik
            Penjualan
          </h2>
          <button
            onclick="exportLaporanCSV()"
            class="w-full sm:w-auto px-5 py-2.5 bg-indigo-600 text-white rounded-xl shadow-md hover:bg-indigo-700 hover:shadow-lg flex items-center justify-center gap-2 font-semibold transition-all active:scale-95"
          >
            <i class="ph-bold ph-download-simple text-lg"></i> Download CSV
          </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
          <div
            class="p-5 border border-slate-200 dark:border-slate-700 rounded-2xl bg-slate-50 dark:bg-slate-900/50 transition-colors"
          >
            <h3
              class="text-center font-bold text-slate-700 dark:text-slate-300 mb-4 flex items-center justify-center gap-2"
            >
              <i class="ph-fill ph-trend-up text-emerald-500"></i> Tren
              Pendapatan Harian
            </h3>
            <canvas id="lineChart" style="max-height: 250px"></canvas>
          </div>
          <div
            class="p-5 border border-slate-200 dark:border-slate-700 rounded-2xl bg-slate-50 dark:bg-slate-900/50 flex flex-col items-center transition-colors"
          >
            <h3
              class="text-center font-bold text-slate-700 dark:text-slate-300 mb-4 flex items-center justify-center gap-2"
            >
              <i class="ph-fill ph-medal text-amber-500"></i> Menu Paling Laris
              (Top 5)
            </h3>
            <canvas
              id="pieChart"
              style="max-height: 250px; width: 100%"
            ></canvas>
          </div>
        </div>

        <div
          id="laporanContent"
          class="text-slate-700 dark:text-slate-300"
        ></div>
      </div>
    </div>

    <script src="../assets/js/global.js"></script>
    <script src="../assets/js/laporan.js"></script>
  </body>
</html>
