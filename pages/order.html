<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Order - Kasir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @media print {
        body * {
          visibility: hidden !important;
        }
        #strukArea,
        #strukArea * {
          visibility: visible !important;
        }
        #strukArea {
          position: absolute !important;
          top: 0 !important;
          left: 0 !important;
          width: 80mm !important;
          margin: 0 !important;
          padding: 0 !important;
          background: #fff !important;
        }
      }

      #strukArea .struk-wrapper {
        width: 80mm;
        max-width: 80mm;
        margin: 0;
        padding: 8px;
        box-sizing: border-box;
        font-family: "Courier New", monospace;
        font-size: 12px;
        color: #000;
      }

      #strukArea .struk-separator {
        margin: 2px 0;
        border-bottom: 1px dashed #000;
      }

      #strukArea .struk-row {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px dotted #999;
        padding: 2px 0;
      }

      #strukArea .struk-summary {
        display: flex;
        justify-content: space-between;
        font-weight: 700;
        margin-top: 5px;
      }
    </style>
  </head>
  <body onload="initKasirPage()" class="bg-slate-50 text-slate-800">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <header class="flex flex-wrap justify-between items-center mb-6">
        <a href="order.html" class="text-2xl font-bold text-emerald-700"
          >KopiKita</a
        >
        <div class="flex items-center gap-3">
          <a href="admin.html" class="px-3 py-2 rounded-lg hover:bg-slate-100"
            >Admin</a
          >
          <a
            href="order.html"
            class="px-3 py-2 rounded-lg bg-emerald-100 text-emerald-700"
            >Order</a
          >
          <button
            onclick="logout()"
            class="px-3 py-2 rounded-lg bg-rose-500 text-white hover:bg-rose-600"
          >
            Ganti Shift (Logout)
          </button>
        </div>
      </header>

      <div
        class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-6"
      >
        <div class="flex justify-between items-center flex-wrap gap-4">
          <h1 class="text-2xl font-bold">🛒 Halaman Kasir</h1>
          <span
            class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-100 text-emerald-700"
            >Role: Kasir</span
          >
        </div>
      </div>

      <div class="grid xl:grid-cols-2 gap-6">
        <div class="space-y-6">
          <section
            class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm"
          >
            <div class="flex justify-between items-center mb-3">
              <h2 class="font-semibold text-lg">📋 Daftar Menu</h2>
              <button
                onclick="tampilanMenuKasir()"
                class="px-3 py-1 text-sm rounded-lg bg-emerald-500 text-white hover:bg-emerald-600"
              >
                Refresh
              </button>
            </div>
            <div class="overflow-x-auto rounded-lg border border-slate-200">
              <table class="min-w-full text-sm">
                <thead class="bg-slate-100 text-slate-600">
                  <tr>
                    <th class="px-3 py-2 text-left">No</th>
                    <th class="px-3 py-2 text-left">Nama Menu</th>
                    <th class="px-3 py-2 text-left">Harga</th>
                    <th class="px-3 py-2 text-center">Stok</th>
                    <th class="px-3 py-2 text-center">Aksi</th>
                  </tr>
                </thead>
                <tbody id="hasil" class="text-slate-700"></tbody>
              </table>
            </div>
          </section>
        </div>

        <div class="space-y-6">
          <section
            class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm"
          >
            <div class="flex justify-between items-center mb-3">
              <h2 class="font-semibold text-lg">📦 Pesanan Saat Ini</h2>
              <button
                onclick="tampilanOrderan()"
                class="px-3 py-1 text-sm rounded-lg bg-emerald-500 text-white hover:bg-emerald-600"
              >
                Refresh
              </button>
            </div>
            <div class="overflow-x-auto rounded-lg border border-slate-200">
              <table class="min-w-full text-sm">
                <thead class="bg-slate-100 text-slate-600">
                  <tr>
                    <th class="px-3 py-2">No</th>
                    <th class="px-3 py-2">Nama</th>
                    <th class="px-3 py-2">Harga</th>
                    <th class="px-3 py-2">Qty</th>
                    <th class="px-3 py-2">SubTotal</th>
                    <th class="px-3 py-2">Aksi</th>
                  </tr>
                </thead>
                <tbody id="hasilOrder" class="text-slate-700"></tbody>
              </table>
            </div>

            <div class="mt-4 flex justify-between items-center font-bold">
              <span>Total Bayar</span>
              <span id="totalBayar" class="text-2xl text-emerald-600"
                >Rp 0</span
              >
            </div>
          </section>

          <section
            class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm space-y-4"
          >
            <div>
              <label
                for="nomorLapak"
                class="block mb-1 text-sm font-medium text-slate-700"
                >Nomor Lapak / Meja</label
              >
              <input
                id="nomorLapak"
                type="text"
                placeholder="Contoh: Meja 4 / Takeaway"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none"
              />
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div>
                <label
                  for="uangDiterima"
                  class="block mb-1 text-sm font-medium text-slate-700"
                  >Uang Diterima (Rp)</label
                >
                <input
                  id="uangDiterima"
                  type="number"
                  min="0"
                  value="0"
                  oninput="updateKembalian()"
                  class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none"
                />
              </div>
              <div>
                <label
                  for="metodePembayaran"
                  class="block mb-1 text-sm font-medium text-slate-700"
                  >Metode</label
                >
                <select
                  id="metodePembayaran"
                  class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none"
                >
                  <option value="Tunai">Tunai</option>
                  <option value="QRIS">QRIS</option>
                  <option value="Transfer">Transfer</option>
                </select>
              </div>
            </div>

            <div class="text-right font-semibold text-slate-700">
              Kembalian: <span id="kembalianVal">Rp 0</span>
            </div>

            <button
              onclick="selesaikanPembayaran()"
              class="w-full rounded-lg bg-indigo-600 text-white py-3 font-bold hover:bg-indigo-700 shadow-md"
            >
              ✅ Selesaikan Pembayaran
            </button>
          </section>

          <div id="strukArea"></div>
        </div>
      </div>
    </div>

    <script src="../assets/js/global.js"></script>
    <script src="../assets/js/kasir.js"></script>
  </body>
</html>
