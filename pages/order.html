<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Order - Kasir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <style>
      /* Scrollbar halus untuk area pesanan */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }

      /* Style khusus untuk cetak struk */
      @media print {
        body * {
          visibility: hidden !important;
        }
        #strukArea,
        #strukArea * {
          visibility: visible !important;
        }
        #strukArea {
          position: absolute !important;
          top: 0 !important;
          left: 0 !important;
          width: 80mm !important;
          margin: 0 !important;
          padding: 0 !important;
          background: #fff !important;
          color: #000 !important;
        }
      }
      .struk-wrapper {
        width: 80mm;
        max-width: 80mm;
        margin: 0;
        padding: 8px;
        box-sizing: border-box;
        font-family: "Courier New", monospace;
        font-size: 12px;
      }
      .struk-separator {
        margin: 4px 0;
        border-bottom: 1px dashed #000;
      }
    </style>
  </head>
  <body
    onload="initKasirPage()"
    class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200 transition-colors duration-300 min-h-screen"
  >
    <nav
      class="sticky top-0 z-40 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 transition-colors"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center gap-2">
            <div
              class="w-10 h-10 bg-emerald-100 dark:bg-emerald-900 rounded-xl flex items-center justify-center"
            >
              <i
                class="ph-fill ph-coffee text-2xl text-emerald-600 dark:text-emerald-400"
              ></i>
            </div>
            <span class="text-xl font-bold tracking-tight">KopiKita</span>
          </div>

          <div class="flex items-center gap-3">
            <a
              href="order.html"
              class="flex items-center gap-2 px-4 py-2 rounded-lg bg-emerald-50 dark:bg-emerald-900/50 text-emerald-700 dark:text-emerald-400 font-semibold transition-all shadow-sm"
            >
              <i class="ph-fill ph-shopping-cart text-lg"></i>
              <span class="hidden sm:block text-sm">Kasir</span>
            </a>

            <button
              onclick="toggleDarkMode()"
              class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all active:scale-95"
              title="Ganti Tema"
            >
              <i
                class="ph-fill ph-moon text-xl text-slate-600"
                id="themeIcon"
              ></i>
            </button>
            <button
              onclick="logout()"
              class="flex items-center gap-2 px-4 py-2 rounded-lg bg-rose-500 text-white font-medium hover:bg-rose-600 shadow-sm transition-all active:scale-95"
            >
              <i class="ph ph-sign-out text-lg"></i>
              <span class="hidden sm:block text-sm">Logout</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <div class="grid xl:grid-cols-12 gap-6">
        <div class="xl:col-span-7 space-y-6">
          <section
            class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-200 dark:border-slate-700 shadow-sm transition-colors"
          >
            <div class="flex justify-between items-center mb-4">
              <h2
                class="font-bold text-lg flex items-center gap-2 text-slate-800 dark:text-white"
              >
                <i class="ph-fill ph-coffee-bean text-emerald-500 text-xl"></i>
                Daftar Menu
              </h2>
            </div>

            <div class="mb-5 space-y-3">
              <div class="relative">
                <i
                  class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"
                ></i>
                <input
                  type="text"
                  id="searchInput"
                  placeholder="Cari menu..."
                  class="w-full rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 pl-10 pr-3 py-2.5 text-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 outline-none transition-all"
                />
              </div>

              <div
                class="flex gap-2 overflow-x-auto pb-2 custom-scrollbar"
                id="categoryButtons"
              >
                <button
                  class="btn-category px-4 py-2 rounded-xl bg-emerald-500 text-white text-sm font-semibold whitespace-nowrap shadow-sm transition-all active:scale-95 flex items-center gap-1.5"
                  data-category="semua"
                >
                  <i class="ph-fill ph-squares-four"></i> Semua
                </button>
                <button
                  class="btn-category px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 text-sm font-semibold whitespace-nowrap transition-all active:scale-95 flex items-center gap-1.5 border border-slate-200 dark:border-slate-700"
                  data-category="kopi"
                >
                  <i class="ph-fill ph-coffee"></i> Kopi
                </button>
                <button
                  class="btn-category px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 text-sm font-semibold whitespace-nowrap transition-all active:scale-95 flex items-center gap-1.5 border border-slate-200 dark:border-slate-700"
                  data-category="non-kopi"
                >
                  <i class="ph-fill ph-brandy"></i> Non-Kopi
                </button>
                <button
                  class="btn-category px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 text-sm font-semibold whitespace-nowrap transition-all active:scale-95 flex items-center gap-1.5 border border-slate-200 dark:border-slate-700"
                  data-category="snack"
                >
                  <i class="ph-fill ph-cookie"></i> Snack
                </button>
              </div>
            </div>

            <div
              class="overflow-x-auto rounded-xl border border-slate-200 dark:border-slate-700"
            >
              <table class="min-w-full text-sm">
                <thead
                  class="bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700"
                >
                  <tr>
                    <th class="px-4 py-3 text-left font-semibold">Nama Menu</th>
                    <th class="px-4 py-3 text-left font-semibold">Harga</th>
                    <th class="px-4 py-3 text-center font-semibold">Stok</th>
                    <th class="px-4 py-3 text-center font-semibold">Aksi</th>
                  </tr>
                </thead>
                <tbody
                  id="hasil"
                  class="text-slate-700 dark:text-slate-300 divide-y divide-slate-100 dark:divide-slate-700/50"
                ></tbody>
              </table>
            </div>
          </section>
        </div>

        <div class="xl:col-span-5 space-y-4">
          <section
            class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-200 dark:border-slate-700 shadow-sm transition-colors flex flex-col"
          >
            <h2
              class="font-bold text-lg mb-4 flex items-center gap-2 text-slate-800 dark:text-white"
            >
              <i class="ph-fill ph-shopping-cart text-indigo-500 text-xl"></i>
              Pesanan Saat Ini
            </h2>

            <div
              class="overflow-x-auto rounded-xl border border-slate-200 dark:border-slate-700 mb-4 max-h-[180px] overflow-y-auto custom-scrollbar"
            >
              <table class="min-w-full text-sm relative">
                <thead
                  class="bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 sticky top-0 z-10 border-b border-slate-200 dark:border-slate-700"
                >
                  <tr>
                    <th class="px-3 py-3 text-left">Item</th>
                    <th class="px-3 py-3 text-center">Qty</th>
                    <th class="px-3 py-3 text-right">Sub</th>
                    <th class="px-3 py-3 text-center">Hapus</th>
                  </tr>
                </thead>
                <tbody
                  id="hasilOrder"
                  class="text-slate-700 dark:text-slate-300 divide-y divide-slate-100 dark:divide-slate-700/50"
                ></tbody>
              </table>
            </div>

            <div
              class="mt-auto border-t border-slate-200 dark:border-slate-700 pt-3 space-y-2 text-sm"
            >
              <div
                class="flex justify-between items-center text-slate-500 dark:text-slate-400"
              >
                <span>Subtotal</span>
                <span
                  id="subtotalDisplay"
                  class="font-semibold text-slate-700 dark:text-slate-200"
                  >Rp 0</span
                >
              </div>

              <div class="flex gap-2">
                <div class="relative flex-1">
                  <i
                    class="ph ph-ticket absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
                  ></i>
                  <input
                    type="text"
                    id="promoCode"
                    placeholder="Kode Promo"
                    class="w-full rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 pl-9 pr-3 py-1.5 text-xs outline-none focus:ring-2 focus:ring-emerald-500 transition-all uppercase"
                  />
                </div>
                <button
                  id="btnApplyPromo"
                  class="px-3 py-1.5 bg-slate-800 dark:bg-slate-700 text-white text-xs font-semibold rounded-lg hover:bg-slate-700 active:scale-95"
                >
                  Pakai
                </button>
              </div>

              <div
                class="flex justify-between items-center font-bold text-base pt-2 border-t border-slate-200 dark:border-slate-700"
              >
                <span class="text-slate-800 dark:text-white">Total Bayar</span>
                <span
                  id="totalDisplay"
                  class="text-xl text-emerald-600 dark:text-emerald-400"
                  >Rp 0</span
                >
              </div>
            </div>
          </section>

          <section
            class="bg-indigo-50 dark:bg-slate-800 rounded-2xl p-5 border border-indigo-100 dark:border-slate-700 shadow-sm transition-colors"
          >
            <h2
              class="font-bold text-lg mb-4 flex items-center gap-2 text-slate-800 dark:text-white"
            >
              <i class="ph-fill ph-wallet text-indigo-500 text-xl"></i>
              Pembayaran
            </h2>

            <div class="space-y-4">
              <div class="grid grid-cols-2 gap-2">
                <div class="relative">
                  <i
                    class="ph ph-map-pin absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
                  ></i>
                  <input
                    id="nomorLapak"
                    type="text"
                    placeholder="No Meja"
                    class="w-full rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 pl-9 pr-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                  />
                </div>
                <div class="relative">
                  <i
                    class="ph ph-credit-card absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
                  ></i>
                  <select
                    id="metodePembayaran"
                    class="w-full rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 pl-9 pr-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all appearance-none font-medium"
                  >
                    <option value="Tunai">Tunai</option>
                    <option value="QRIS">QRIS</option>
                  </select>
                </div>
              </div>

              <div class="relative">
                <i
                  class="ph ph-money absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl"
                ></i>
                <input
                  id="uangDiterima"
                  type="number"
                  placeholder="Uang Diterima"
                  oninput="updateKembalian()"
                  class="w-full rounded-xl border-2 border-indigo-200 dark:border-indigo-900/50 bg-white dark:bg-slate-800 pl-11 pr-3 py-2 text-lg font-black outline-none focus:border-indigo-500 transition-all"
                />
              </div>

              <div
                class="flex justify-between items-center bg-white dark:bg-slate-900 p-2 rounded-xl border border-slate-200 dark:border-slate-700"
              >
                <span class="font-semibold text-xs text-slate-500"
                  >Kembalian:</span
                >
                <span
                  id="kembalianVal"
                  class="text-lg font-bold text-slate-800 dark:text-white"
                  >Rp 0</span
                >
              </div>

              <button
                onclick="selesaikanPembayaran()"
                class="w-full flex items-center justify-center gap-2 rounded-xl bg-indigo-600 text-white py-3.5 font-bold hover:bg-indigo-700 shadow-md active:scale-95 transition-all uppercase text-sm"
              >
                <i class="ph-bold ph-check-circle text-xl"></i> Selesaikan
              </button>
            </div>
          </section>

          <div id="strukArea" class="hidden"></div>
        </div>
      </div>
    </div>

    <script src="../assets/js/global.js"></script>
    <script src="../assets/js/kasir.js"></script>
  </body>
</html>
