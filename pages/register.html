<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register KopiKita</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a class="brand" href="register.html">KopiKita</a>
      <div class="nav-right">
        <a href="login.html">Login</a>
      </div>
    </nav>

    <div class="container">
      <div class="page-title">
        <h1>✍️ Register Akun</h1>
        <span class="badge-status">Role: Baru</span>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>Daftar sebagai Admin/Kasir</h3>
        </div>
        <div class="input-group">
          <input type="text" id="regUsername" placeholder="Username" />
          <input type="password" id="regPassword" placeholder="Password" />
          <select id="regRole">
            <option value="kasir">Kasir</option>
            <option value="admin">Admin</option>
          </select>
          <button onclick="handleRegister()" class="success">Daftar</button>
        </div>
        <p id="registerMessage"></p>
      </div>
    </div>

    <script src="../assets/js/login.js"></script>
  </body>
</html>
