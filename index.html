<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0;url=pages/login.html" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirect ke Login</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <p>Redirecting ke <a href="login.html">login</a>...</p>
    <nav class="navbar">
      <a class="brand" href="pages/login.html">KopiKita</a>
      <div class="nav-right">
        <a href="pages/admin.html">Admin</a>
        <a href="pages/order.html">Order</a>
        <a href="pages/login.html">Logout</a>
      </div>
    </nav>

    <div class="container">
      <h1>📋 HALAMAN MENU</h1>

      <div class="nav-links">
        <a href="order.html">🛒 Halaman Order</a>
      </div>

      <!-- Add Menu Card -->
      <div class="card">
        <div class="card-header">
          <h3>➕ Tambah Menu Baru</h3>
        </div>
        <div class="input-group">
          <input type="text" id="menuBaru" placeholder="Masukan Nama Menu" />
          <input
            type="number"
            id="hargaMenu"
            placeholder="Masukan Harga Menu"
          />
          <button onclick="tambahMenu()" class="success">➕ Tambah Menu</button>
        </div>
      </div>

      <!-- Menu List Card -->
      <div class="card">
        <div class="card-header">
          <h3>📋 Daftar Menu</h3>
        </div>
        <button onclick="tampilanMenu()" class="success">
          🔄 Refresh Menu
        </button>
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>Nama Menu</th>
              <th>Harga</th>
            </tr>
          </thead>
          <tbody id="hasil"></tbody>
        </table>
      </div>

      <!-- Delete Menu Card -->
      <div class="card">
        <div class="card-header">
          <h3>🗑️ Hapus Menu</h3>
        </div>
        <div class="input-group">
          <input type="number" id="hapus" placeholder="Masukan Nomor Menu" />
          <button onclick="hapusMenu()" class="danger">🗑️ Hapus Menu</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
